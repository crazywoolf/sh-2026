<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meridian — AI-аналитик</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <header>
    <div class="logo">
      <div class="mark">M</div>
      <div>
        <h1>Meridian</h1>
        <div class="sub">AI-аналитик для совета директоров</div>
      </div>
    </div>
    <div class="spacer"></div>
    <button class="hbtn" id="reports-btn" title="Автоотчёты">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18M8 15h2v2M14 14v3"/></svg>
      Автоотчёты
    </button>
    <button class="hbtn icon" id="new-chat" title="Новый чат" aria-label="Новый чат">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
    </button>
  </header>

  <div class="thread" id="thread">
    <div class="thread-inner" id="log">
      <div class="welcome" id="welcome">
        <div class="mark">M</div>
        <h2>Спросите про бизнес Meridian</h2>
        <p>Задайте вопрос на естественном языке — система сама решит, ответить кратко или провести мини-исследование. Вот с чего можно начать:</p>
        <div class="suggest" id="suggest"></div>
      </div>
    </div>
  </div>

  <div class="dock">
    <div class="dock-inner">
      <div class="composer">
        <textarea id="input" rows="1" placeholder="Спросите про выручку, отток, юнит-экономику…"></textarea>
        <button class="send" id="send" aria-label="Отправить">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        </button>
      </div>
      <div class="hint">Enter — отправить · Shift+Enter — перенос строки</div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
