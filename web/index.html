<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meridian — AI-аналитик</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <header>
    <div class="logo">
      <div class="mark">M</div>
      <div>
        <h1>Meridian</h1>
        <div class="sub">AI-аналитик для совета директоров</div>
      </div>
    </div>
    <div class="spacer"></div>
    <button class="hbtn" id="reports-btn" title="Скоро">📊 Автоотчёты</button>
    <button class="hbtn icon" id="new-chat" title="Новый чат" aria-label="Новый чат">✚</button>
  </header>

  <div class="thread" id="thread">
    <div class="thread-inner" id="log">
      <div class="welcome" id="welcome">
        <div class="mark">M</div>
        <h2>Спросите про бизнес Meridian</h2>
        <p>Задайте вопрос на естественном языке — система сама решит, ответить кратко или провести мини-исследование. Вот с чего можно начать:</p>
        <div class="suggest" id="suggest"></div>
      </div>
    </div>
  </div>

  <div class="dock">
    <div class="dock-inner">
      <div class="composer">
        <textarea id="input" rows="1" placeholder="Спросите про выручку, отток, юнит-экономику…"></textarea>
        <button class="send" id="send" aria-label="Отправить">↑</button>
      </div>
      <div class="hint">Enter — отправить · Shift+Enter — перенос строки</div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
