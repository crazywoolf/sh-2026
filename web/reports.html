<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meridian — отправленные отчёты</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    .rpage { max-width: 860px; margin: 0 auto; padding: 20px 16px; }
    .rhead { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .rhead h1 { font-size: 18px; margin: 0; font-weight: 600; }
    .ritem { background: var(--surface); border: 1px solid var(--line); border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
    .rtop { display: flex; align-items: center; gap: 12px; padding: 13px 15px; cursor: pointer; }
    .ric { width: 34px; height: 34px; border-radius: 8px; background: var(--brand-bg); color: var(--brand); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .rtitle { font-size: 14px; font-weight: 600; }
    .rsub { font-size: 12px; color: var(--txt-2); }
    .rbadge { font-size: 11px; padding: 2px 9px; border-radius: 20px; }
    .rbadge.ok { background: #e1f5ee; color: #0f6e56; }
    .rbadge.alert { background: var(--warn-bg); color: var(--danger); }
    .rbody { padding: 0 15px 14px; border-top: 1px solid var(--line); }
    .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
    .rcard { border: 1px solid var(--line); border-radius: 8px; padding: 12px; }
    .rcard.alert { border-left: 3px solid var(--danger); }
    .rcard h3 { font-size: 13px; margin: 0 0 6px; font-weight: 600; }
    .rcard .resp { font-size: 12px; color: var(--txt-2); line-height: 1.5; }
    .recs { margin-top: 12px; padding: 11px 13px; border-left: 3px solid var(--brand); background: var(--brand-bg); border-radius: 0 8px 8px 0; font-size: 13px; }
    .empty { color: var(--txt-2); text-align: center; padding: 40px; }
    @media (max-width: 640px) { .cards { grid-template-columns: 1fr; } }

    /* Обзор ключевых метрик */
    .ov-title { font-size: 15px; font-weight: 600; margin: 4px 0 10px; }
    .ov-title span { font-size: 12px; color: var(--txt-2); font-weight: 400; }
    .mcards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .mcard { background: var(--surface); border: 1px solid var(--line); border-top: 3px solid var(--line-strong);
      border-radius: 10px; padding: 11px 13px; cursor: pointer; transition: .15s; }
    .mcard:hover { border-color: var(--brand); }
    .mcard.active { border-top-color: var(--brand); background: var(--brand-bg2); }
    .mcard .mlabel { font-size: 11.5px; color: var(--txt-2); }
    .mcard .mval { font-size: 19px; font-weight: 700; letter-spacing: -.02em; margin-top: 3px; }
    .mcard .mdelta { font-size: 11px; margin-top: 2px; color: var(--txt-3); }
    .mcard .mdelta.good { color: #0f6e56; } .mcard .mdelta.bad { color: var(--danger); }
    .mchart { background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 14px; margin-top: 12px; }
    .mchart h3 { font-size: 14px; margin: 0 0 3px; font-weight: 600; }
    .mchart .mc-note { font-size: 12.5px; color: var(--txt-2); margin-bottom: 10px; }
    .mchart .mc-canvas { max-width: 560px; margin: 0 auto; }
    @media (max-width: 860px) { .mcards { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 460px) { .mcards { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <div class="logo"><div class="mark">M</div><div><h1 style="font-size:16px;margin:0">Meridian</h1><div class="sub">Отправленные автоотчёты</div></div></div>
    <div class="spacer"></div>
    <a class="hbtn" href="/">← В чат</a>
  </header>
  <div class="rpage">
    <div class="ov-title">Ключевые метрики бизнеса <span>· клик по карточке — график ниже</span></div>
    <div id="metric-cards" class="mcards"></div>
    <div id="metric-chart" class="mchart"></div>

    <div class="ov-title" style="margin-top:22px">Отправленные автоотчёты</div>
    <div id="list"><div class="empty">Загрузка…</div></div>
  </div>
  <script>
    let seq = 0;
    const esc = (s) => String(s ?? "").replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
    const fmt = (iso) => { try { return new Date(iso).toLocaleString("ru"); } catch { return iso; } };

    const RU_MON = ["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"];
    const fmtLabel = (s) => { const m = /^(\d{4})-(\d{2})(?:-\d{2})?$/.exec(s); return m ? RU_MON[+m[2]-1] + " " + m[1].slice(2) : s; };
    function fmtNum(v, pct) {
      if (v == null || isNaN(v)) return "";
      if (pct) return String(Math.round(v*100)/100).replace(".",",") + "%";
      const a = Math.abs(v);
      if (a >= 1e9) return (v/1e9).toFixed(1).replace(".",",") + " млрд";
      if (a >= 1e6) return Math.round(v/1e6) + " млн";
      if (a >= 1e3) return Math.round(v/1e3) + " тыс";
      return String(Math.round(v*100)/100).replace(".",",");
    }
    function chartInto(parent, chart) {
      if (!chart || !chart.data || !chart.data.length) return;
      const cv = document.createElement("canvas"); cv.id = "rc" + seq++;
      parent.appendChild(cv);
      const x = chart.x, y = Array.isArray(chart.y) ? chart.y[0] : chart.y;
      const type = ["line", "bar", "pie"].includes(chart.type) ? chart.type : "bar";
      const pal = ["#5d56c4", "#1d9e75", "#e24b4a", "#ba7517", "#378add", "#7f77dd"];
      const isPct = /pct|rate|margin|доля|процент/i.test(String(y));
      const f = (v) => fmtNum(v, isPct);
      new Chart(cv, {
        type,
        data: { labels: chart.data.map((r) => fmtLabel(String(r[x]))), datasets: [{ label: chart.title || y, data: chart.data.map((r) => Number(r[y])), backgroundColor: type === "pie" ? pal : "#5d56c4", borderColor: "#5d56c4", borderWidth: type === "line" ? 2 : 0 }] },
        options: {
          plugins: {
            legend: { display: type === "pie" },
            tooltip: { callbacks: { label: (c) => (type === "pie" ? c.label + ": " : "") + f(type === "pie" ? c.parsed : c.parsed.y) } },
          },
          scales: type === "pie" ? {} : { y: { beginAtZero: true, ticks: { callback: (v) => f(v) } } },
        },
      });
    }

    function renderReport(rep) {
      const alerts = rep.items.filter((i) => i.alert || i.insufficient_data).length;
      const wrap = document.createElement("div"); wrap.className = "ritem";
      const top = document.createElement("div"); top.className = "rtop";
      top.innerHTML = `<div class="ric"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M8 13h2v4M14 11v6"/></svg></div>
        <div style="flex:1"><div class="rtitle">Дашборд здоровья</div><div class="rsub">${fmt(rep.generatedAt)} · ${rep.items.length} метрик</div></div>
        <span class="rbadge ${alerts ? "alert" : "ok"}">${alerts ? alerts + " тревог" : "норма"}</span>`;
      const body = document.createElement("div"); body.className = "rbody"; body.style.display = "none";
      const grid = document.createElement("div"); grid.className = "cards";
      for (const it of rep.items) {
        const c = document.createElement("div"); c.className = "rcard" + (it.alert || it.insufficient_data ? " alert" : "");
        c.innerHTML = `<h3>${esc(it.title)}</h3><div class="resp">${esc((it.response || "").replace(/\*\*/g, "")).slice(0, 200)}</div>`;
        chartInto(c, it.chart);
        grid.appendChild(c);
      }
      body.appendChild(grid);
      const block = (title, arr, color, bg) => {
        if (!arr || !arr.length) return;
        const d = document.createElement("div");
        d.style.cssText = "margin-top:12px;padding:11px 13px;border-left:3px solid " + color + ";background:" + bg + ";border-radius:0 8px 8px 0;font-size:13px";
        d.innerHTML = "<b>" + title + "</b>" + arr.map((x) => "<div>• " + esc(x) + "</div>").join("");
        body.appendChild(d);
      };
      block("⚠️ Риски", rep.risks, "#e24b4a", "#fceceb");
      block("💡 Рекомендации", rep.recommendations, "#5d56c4", "#eeedfe");
      block("🔍 Качество данных и оговорки", rep.caveats, "#ba7517", "#fbf2e3");
      top.onclick = () => { body.style.display = body.style.display === "none" ? "block" : "none"; };
      wrap.appendChild(top); wrap.appendChild(body);
      return wrap;
    }

    async function load() {
      const list = document.getElementById("list");
      try {
        const reps = await (await fetch("/api/reports")).json();
        if (!reps.length) { list.innerHTML = '<div class="empty">Отчётов пока нет. Соберите первый из чата (кнопка «Автоотчёты» → «Собрать сейчас») или дождитесь расписания.</div>'; return; }
        list.innerHTML = "";
        reps.forEach((rep, i) => { const node = renderReport(rep); if (i === 0) node.querySelector(".rbody").style.display = "block"; list.appendChild(node); });
      } catch { list.innerHTML = '<div class="empty">Не удалось загрузить отчёты.</div>'; }
    }
    // --- Обзор: 8 ключевых бизнес-метрик (данные из витрины Meridian) ---
    // помесячные ряды (36 мес, янв-2023 … дек-2025) из витрины Meridian
    const MONTHS = Array.from({ length: 36 }, (_, i) => (2023 + Math.floor(i / 12)) + "-" + String(i % 12 + 1).padStart(2, "0") + "-01");
    const mser = (yname, vals) => MONTHS.map((m, i) => ({ month: m, [yname]: vals[i] }));
    const SER_GMV = [9001931878,9319655774,9843185483,10317670264,10260199510,10314725540,10511566695,10219699616,9865948756,9929090267,9837539773,10488811344,10555440228,10676927914,11177456950,11772919237,11935105792,12241059330,11921609783,11640165575,11952079733,11553326625,11672037400,12166899165,12278155060,12960018117,13272577830,14053817370,14136288967,14277867181,14097570877,14386373042,13762653824,13428446723,13893883317,14365679281];
    const SER_REV = [689257438,685443461,711210615,737551634,719828920,703920282,699302123,663281669,619687422,613042425,594651663,626996308,613018500,595715819,619771810,634410162,627234321,635517142,607331205,579654782,574272111,545780201,542835460,557367347,545157776,565954513,564950420,587490231,590767604,590165324,568075441,577335490,543433092,521151486,539823413,561338138];
    const SER_TAKE = [7.81,7.51,7.38,7.3,7.17,6.98,6.81,6.64,6.43,6.33,6.19,6.13,5.96,5.73,5.69,5.54,5.4,5.34,5.24,5.12,4.95,4.87,4.79,4.72,4.58,4.51,4.39,4.32,4.32,4.27,4.17,4.15,4.09,4.02,4.02,4.05];
    const SER_EBITDA = [199653027,177927530,214176346,204041189,180405333,153006341,142774313,112942817,59604638,41158184,743497,27106596,-588133,-23303640,-33268725,-26025811,-45009340,-67668057,-85519757,-121073126,-128883200,-156909734,-161690194,-157958824,-170511778,-154082398,-142660097,-129375485,-106334950,-112750375,-131311845,-111522447,-142078667,-166296292,-145278861,-126307442];
    const SER_INACT = [45.9,27.1,17.6,17.3,17.4,17.9,17.8,17.9,17.7,17.5,17.9,18.4,18.5,18.6,18.9,19.1,19.4,20,20.6,21.1,21.8,22.2,22.4,22.8,24,24.6,25.1,25.6,26.7,27.5,28.4,29,29.7,30.6,31.7,32.5];
    const SER_NPS = [12.1,13.5,10.6,11,17.3,14.3,20.2,19.2,17.7,23,21.6,21.4,21,21.6,21.7,26.8,26.6,28.2,29.4,28.5,25.7,29.9,30.6,27.5,30.6,38.1,31.1,33,30.5,33.8,35.7,34.6,33.8,31.2,36.5,36.2];

    const METRICS = [
      { label: "GMV (оборот)", val: "164,9 млрд ₽", delta: "+37% за 3 года", cls: "good",
        note: "Оборот платформы растёт — но это лишь объём, не доход. Помесячно, 2023–2025.",
        chart: { type: "line", x: "month", y: "gmv", title: "GMV, помесячно", data: mser("gmv", SER_GMV) } },
      { label: "Выручка (net)", val: "6,76 млрд ₽", delta: "−16% за 3 года", cls: "bad",
        note: "Выручка падает при растущем обороте — проблема монетизации. Помесячно.",
        chart: { type: "line", x: "month", y: "revenue", title: "Чистая выручка, помесячно", data: mser("revenue", SER_REV) } },
      { label: "Take rate", val: "4,24%", delta: "было 6,89%", cls: "bad",
        note: "Доля площадки с оборота сжимается каждый месяц — корень падения выручки.",
        chart: { type: "line", x: "month", y: "take_rate", title: "Take rate, % (помесячно)", data: mser("take_rate", SER_TAKE) } },
      { label: "EBITDA", val: "−1,64 млрд ₽", delta: "минус с 2024", cls: "bad",
        note: "Помесячная EBITDA ушла в минус в начале 2024 и не вернулась.",
        chart: { type: "line", x: "month", y: "ebitda", title: "EBITDA, помесячно", data: mser("ebitda", SER_EBITDA) } },
      { label: "LTV/CAC", val: "SMB 0,59", delta: "SMB убыточен", cls: "bad",
        note: "Large окупается втрое, а SMB (62,6% базы) — в убыток (последний месяц).",
        chart: { type: "bar", x: "segment", y: "ltv_cac", title: "LTV/CAC по сегментам", data: [{ segment: "Large", ltv_cac: 3.03 }, { segment: "Mid", ltv_cac: 1.68 }, { segment: "SMB", ltv_cac: 0.59 }] } },
      { label: "Спящие клиенты", val: "32,5%", delta: "рост с 18,4%", cls: "bad",
        note: "Доля неактивных растёт каждый месяц — тихий (экономический) отток.",
        chart: { type: "line", x: "month", y: "inactive_pct", title: "Доля неактивных, % (помесячно)", data: mser("inactive_pct", SER_INACT) } },
      { label: "NPS (агрегат)", val: "≈34", delta: "когорта упала 52,5→33,4", cls: "bad",
        note: "Агрегатный NPS помесячно растёт, НО по одной когорте клиентов он упал 52,5→33,4 (survivorship: недовольные ушли из выборки).",
        chart: { type: "line", x: "month", y: "nps", title: "NPS агрегат, помесячно", data: mser("nps", SER_NPS) } },
      { label: "Причина оттока №1", val: "Цена 24,6%", delta: "AI-альт. лишь 14,7%", cls: "",
        note: "Главная причина ухода — цена, а не «к AI-инструментам» (частый миф).",
        chart: { type: "bar", x: "reason", y: "pct", title: "Причины оттока, %", data: [{ reason: "Цена", pct: 24.6 }, { reason: "Нет потребн.", pct: 18.9 }, { reason: "Качество", pct: 17.3 }, { reason: "Консолид.", pct: 15.5 }, { reason: "AI-альт.", pct: 14.7 }, { reason: "Другое", pct: 9.0 }] } },
    ];
    function showMetric(m) {
      const box = document.getElementById("metric-chart");
      box.innerHTML = '<h3>' + esc(m.chart.title) + '</h3><div class="mc-note">' + esc(m.note) + '</div>';
      const wrap = document.createElement("div"); wrap.className = "mc-canvas";
      box.appendChild(wrap);
      chartInto(wrap, m.chart);
    }
    function renderMetrics() {
      const cont = document.getElementById("metric-cards");
      cont.innerHTML = "";
      METRICS.forEach((m, i) => {
        const c = document.createElement("div"); c.className = "mcard" + (i === 0 ? " active" : "");
        c.innerHTML = '<div class="mlabel">' + esc(m.label) + '</div><div class="mval">' + esc(m.val) + '</div><div class="mdelta ' + m.cls + '">' + esc(m.delta) + '</div>';
        c.onclick = () => { cont.querySelectorAll(".mcard").forEach((x) => x.classList.remove("active")); c.classList.add("active"); showMetric(m); };
        cont.appendChild(c);
      });
      showMetric(METRICS[0]);
    }
    renderMetrics();

    load();
    setInterval(load, 15000);
  </script>
</body>
</html>
